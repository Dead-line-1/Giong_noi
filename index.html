<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; user-select: none; }
        .header { background: #2c3e50; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .main-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        /* Video Area */
        .video-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .cam-box { border: 4px solid #34495e; border-radius: 10px; overflow: hidden; background: #000; width: 640px; height: 480px; position: relative; max-width: 100%; }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 14px; border-radius: 5px; z-index: 10; font-weight: bold;}

        /* Sidebar Controls */
        .sidebar { background: #2c3e50; padding: 20px; border-radius: 10px; min-width: 320px; }
        .status-box { text-align: left; font-size: 15px; background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #3498db; line-height: 1.6; }
        .val { color: #2ecc71; font-weight: bold; }
        .disconnected { color: #e74c3c; font-weight: bold; }
        
        /* Buttons */
        .controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; justify-content: center; margin-bottom: 20px; }
        .btn { padding: 18px; font-size: 20px; cursor: pointer; background: #34495e; border: 1px solid #5d6d7e; color: white; border-radius: 12px; transition: 0.2s; touch-action: manipulation;}
        .btn:active { background: #2ecc71; transform: scale(0.9); }
        .btn-stop { background: #e74c3c; grid-column: 2; }

        /* Mode Buttons */
        .mode-btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; touch-action: manipulation;}
        .btn-voice { background: #9b59b6; } 
        .btn-voice.active { background: #8e44ad; box-shadow: 0 0 15px #9b59b6; animation: pulse 1.5s infinite; transform: scale(0.98);}
        .btn-auto { background: #16a085; }

        #voice-log { font-size: 13px; color: #f1c40f; margin-top: 10px; min-height: 20px; font-style: italic; }
        .keyboard-hint { font-size: 12px; margin-top: 15px; color: #bdc3c7; }

        @keyframes pulse { 0% { transform: scale(0.98); } 50% { transform: scale(1.02); } 100% { transform: scale(0.98); } }
    </style>
</head>
<body>

    <div class="header">
        <h2>HỆ THỐNG ĐIỀU KHIỂN ROBOT</h2>
    </div>

    <div class="main-grid">
        <div class="video-wrapper">
            <div class="cam-box">
                <span class="label">🔴 LIVE CAMERA ESP32-CAM</span>
                <img id="video-stream" src="http://192.168.1.15:81/stream" crossorigin="anonymous" alt="Đang chờ kết nối Camera...">
            </div>
        </div>

        <div class="sidebar">
            <div class="status-box">
                Kết nối: <span id="conn-status" class="disconnected">Đang tìm ESP32...</span><br>
                Phát hiện vật cản: <span id="dist-val" class="val">0</span> mm<br>
                Hướng di chuyển: <span id="stt-text" class="val">Dừng 🛑</span><br>
                Chế độ điều khiển: <span id="mode-text" class="val">THỦ CÔNG</span>
            </div>

            <div class="controls">
                <div></div><button class="btn" onmousedown="send('F')" onmouseup="send('S')" ontouchstart="send('F')" ontouchend="send('S')">▲</button><div></div>
                <button class="btn" onmousedown="send('L')" onmouseup="send('S')" ontouchstart="send('L')" ontouchend="send('S')">◀</button>
                <button class="btn btn-stop" onmousedown="send('S')" ontouchstart="send('S')">■</button>
                <button class="btn" onmousedown="send('R')" onmouseup="send('S')" ontouchstart="send('R')" ontouchend="send('S')">▶</button>
                <div></div><button class="btn" onmousedown="send('B')" onmouseup="send('S')" ontouchstart="send('B')" ontouchend="send('S')">▼</button><div></div>
            </div>

            <button class="mode-btn btn-auto" onclick="toggleAuto()">BẬT TỰ ĐỘNG NÉ VẬT CẢN</button>
            
            <button id="btn-voice" class="mode-btn btn-voice" 
                    onmousedown="startVoice()" onmouseup="stopVoice()" onmouseleave="stopVoice()"
                    ontouchstart="startVoice()" ontouchend="stopVoice()">
                NHẤN GIỮ ĐỂ NÓI 🎤
            </button>
            <div id="voice-log">Đang chờ lệnh...</div>
            
            <div class="keyboard-hint">💡 Gợi ý: Có thể dùng phím W, A, S, D trên máy tính để lái</div>
        </div>
    </div>

    <script>
        const ESP32_IP = "http://192.168.1.10"; 
        
        let lastCmd = 'S';
        let autoActive = false;
        
        // --- THÔNG SỐ GIỌNG NÓI ---
        const TIME_SHORT_MOVE = 400; // ms chạy thoáng chốc
        const TIME_TURN_90 = 600;    // ms xoay góc
        let voiceTimeout1, voiceTimeout2; 

        // ==========================================
        // 1. GỬI LỆNH ĐẾN ESP32
        // ==========================================
        function send(dir) {
            if(autoActive && dir !== 'S') return; 
            if (dir !== lastCmd) {
                let dirText = "Dừng 🛑";
                if(dir === 'F') dirText = "Tiến ⬆️";
                else if(dir === 'B') dirText = "Lùi ⬇️";
                else if(dir === 'L') dirText = "Trái ⬅️";
                else if(dir === 'R') dirText = "Phải ➡️";

                document.getElementById('stt-text').innerText = dirText;
                fetch(`${ESP32_IP}/move?dir=${dir}`).catch(() => {});
                lastCmd = dir;
            }
        }

        function toggleAuto() {
            autoActive = !autoActive;
            document.getElementById('mode-text').innerText = autoActive ? "TỰ ĐỘNG NÉ" : "THỦ CÔNG";
            fetch(`${ESP32_IP}/mode?auto=${autoActive ? 1 : 0}`).catch(() => {});
            if(autoActive) send('S'); 
        }

        setInterval(() => {
            fetch(`${ESP32_IP}/data`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('dist-val').innerText = data.dist;
                    document.getElementById('conn-status').innerText = "ĐÃ KẾT NỐI ESP32";
                    document.getElementById('conn-status').className = "val";
                })
                .catch(() => {
                    document.getElementById('conn-status').innerText = "MẤT KẾT NỐI ESP32";
                    document.getElementById('conn-status').className = "disconnected";
                });
        }, 500);

        // ==========================================
        // 2. BÀN PHÍM
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            const key = e.key.toLowerCase();
            if(key === 'w') send('F');
            else if(key === 's') send('B');
            else if(key === 'a') send('L');
            else if(key === 'd') send('R');
        });
        document.addEventListener('keyup', (e) => {
            if(['w','a','s','d'].includes(e.key.toLowerCase())) send('S');
        });

        // ==========================================
        // 3. ĐIỀU KHIỂN GIỌNG NÓI (HOLD TO SPEAK)
        // ==========================================
        let recognition;
        let isHoldingVoice = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'vi-VN'; 
            recognition.continuous = true;
            recognition.interimResults = true; // BẬT ĐỂ NHẬN LỆNH NGAY LẬP TỨC KHÔNG CẦN CHỜ

            recognition.onresult = (event) => {
                // Lấy kết quả mới nhất đang được nói
                let transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-log').innerText = "🗣️ Đang nghe: " + transcript;
                
                processImmediateVoice(transcript);
            };

            recognition.onerror = (e) => {
                console.error("Lỗi Voice:", e.error);
                stopVoice();
            };
        }

        function processImmediateVoice(transcript) {
            // "Mã hóa" các cụm từ đặc biệt để ưu tiên trước
            let safeText = transcript.replace(/sang phải/g, "cmd_sp").replace(/sang trái/g, "cmd_st");
            
            // Tìm từ khóa cuối cùng được nhắc đến trong chuỗi để cập nhật lệnh ngay lập tức
            const cmds = {
                "cmd_sp": "SR", // Sang phải (Xoay -> tiến -> dừng)
                "cmd_st": "SL", // Sang trái (Xoay -> tiến -> dừng)
                "phải": "R",    // Xoay phải (Chỉ nhận diện chữ phải)
                "trái": "L",    // Xoay trái (Chỉ nhận diện chữ trái)
                "tiến": "F", "lên": "F", "tới": "F",
                "lùi": "B", "xuống": "B",
                "dừng": "S", "lại": "S"
            };
            
            let foundCmd = null;
            let lastIdx = -1;
            
            // Tìm vị trí xuất hiện cuối cùng của các từ khóa, từ khóa nào nằm cuối cùng sẽ được thi hành
            for (const [kw, action] of Object.entries(cmds)) {
                let idx = safeText.lastIndexOf(kw);
                if (idx > lastIdx) {
                    lastIdx = idx;
                    foundCmd = action;
                }
            }

            if (foundCmd) {
                executeVoiceAction(foundCmd);
            }
        }

        function executeVoiceAction(action) {
            // Xóa các lệnh dừng cũ để thay thế bằng lệnh mới nếu người dùng vẫn đang đọc
            clearTimeout(voiceTimeout1);
            clearTimeout(voiceTimeout2);

            if (action === "SR") {
                send('R'); 
                voiceTimeout1 = setTimeout(() => {
                    send('F'); 
                    voiceTimeout2 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
                }, TIME_TURN_90);
            } 
            else if (action === "SL") {
                send('L'); 
                voiceTimeout1 = setTimeout(() => {
                    send('F'); 
                    voiceTimeout2 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
                }, TIME_TURN_90);
            }
            else if (action === "R") {
                send('R');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_TURN_90);
            } 
            else if (action === "L") {
                send('L');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_TURN_90);
            }
            else if (action === "F") {
                send('F');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_SHORT_MOVE); 
            } 
            else if (action === "B") {
                send('B');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
            } 
            else if (action === "S") {
                send('S');
            }
        }

        function startVoice() {
            if (!recognition) return alert("Trình duyệt không hỗ trợ (Hãy dùng Chrome).");
            if (isHoldingVoice) return;
            isHoldingVoice = true;
            
            try { recognition.start(); } catch(e) {} // Bắt đầu nghe
            
            document.getElementById('btn-voice').innerText = "ĐANG NGHE... 🗣️ (THẢ RA ĐỂ DỪNG)";
            document.getElementById('btn-voice').classList.add('active');
            document.getElementById('voice-log').innerText = "Vui lòng nói lệnh...";
        }

        function stopVoice() {
            if (!isHoldingVoice) return;
            isHoldingVoice = false;
            
            try { recognition.stop(); } catch(e) {} // Dừng nghe
            
            document.getElementById('btn-voice').innerText = "NHẤN GIỮ ĐỂ NÓI 🎤";
            document.getElementById('btn-voice').classList.remove('active');
            document.getElementById('voice-log').innerText = "Đã tắt micro.";
        }
    </script>
</body>
</html>
