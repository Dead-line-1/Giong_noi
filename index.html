<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control & Mapping - Voice Integration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; }
        .header { background: #2c3e50; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .main-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        #video-container { position: relative; border: 4px solid #34495e; border-radius: 10px; overflow: hidden; background: #000; }
        #video-stream { width: 640px; height: 480px; max-width: 100%; object-fit: cover; }
        .sidebar { background: #2c3e50; padding: 20px; border-radius: 10px; min-width: 300px; }
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 15px; font-size: 16px; cursor: pointer; background: #3498db; border: none; color: white; border-radius: 8px; transition: 0.2s; }
        .btn:active { background: #2980b9; transform: scale(0.95); }
        .btn-auto { background: #e67e22; width: 100%; margin-top: 20px; font-weight: bold; }
        .btn-voice { background: #9b59b6; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-voice.active { background: #e74c3c; animation: pulse 1.5s infinite; }
        .btn-stop { background: #e74c3c; grid-column: 2; }
        .status-box { margin-bottom: 20px; text-align: left; font-size: 14px; background: #34495e; padding: 10px; border-radius: 5px; }
        .val { color: #2ecc71; font-weight: bold; }
        .disconnected { color: #e74c3c; }
        #voice-log { font-size: 12px; color: #bdc3c7; margin-top: 5px; min-height: 15px; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>HỆ THỐNG ĐIỀU KHIỂN & MAPPING</h2>
    </div>

    <div class="main-grid">
        <div id="video-container">
            <img id="video-stream" src="http://192.168.1.15:81/stream" alt="Chưa có kết nối Camera">
        </div>

        <div class="sidebar">
            <div class="status-box">
                Trạng thái: <span id="conn-status" class="disconnected">Mất kết nối</span><br>
                Khoảng cách (VL53L1X): <span id="dist-val" class="val">0</span> mm<br>
                Chế độ: <span id="mode-text" class="val">THỦ CÔNG</span>
            </div>

            <div class="controls">
                <div></div><button class="btn" onmousedown="send('F')" onmouseup="send('S')">▲</button><div></div>
                <button class="btn" onmousedown="send('L')" onmouseup="send('S')">◀</button>
                <button class="btn btn-stop" onmousedown="send('S')">■</button>
                <button class="btn" onmousedown="send('R')" onmouseup="send('S')">▶</button>
                <div></div><button class="btn" onmousedown="send('B')" onmouseup="send('S')">▼</button><div></div>
            </div>

            <button class="btn btn-auto" onclick="toggleAuto()">BẬT TỰ ĐỘNG LÁI (NÉ VẬT CẢN)</button>
            
            <button id="btn-voice" class="btn btn-voice" onclick="toggleVoice()">BẬT ĐIỀU KHIỂN GIỌNG NÓI</button>
            <div id="voice-log">Đang chờ lệnh...</div>
        </div>
    </div>

    <script>
        const ESP32_IP = "http://192.168.1.10"; 
        let autoActive = false;
        let voiceActive = false;
        let recognition;
        let voiceTimeout; // Biến quản lý thời gian để reset lệnh dừng

        // Cấu hình Nhận diện giọng nói
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'vi-VN'; // Tiếng Việt
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-log').innerText = "Bạn đã nói: " + result;
                handleVoiceCommand(result);
            };

            recognition.onerror = (event) => {
                console.error("Lỗi Voice:", event.error);
                stopVoice();
            };
        }

        function handleVoiceCommand(cmd) {
            // Hủy lệnh tự động dừng cũ nếu người dùng đọc lệnh mới liên tiếp
            if(voiceTimeout) clearTimeout(voiceTimeout);

            if (cmd.includes("tới") || cmd.includes("tiến") || cmd.includes("thẳng")) {
                send('F');
                voiceTimeout = setTimeout(() => send('S'), 2000); // Tự dừng sau 2s để an toàn
            } else if (cmd.includes("lùi")) {
                send('B');
                voiceTimeout = setTimeout(() => send('S'), 2000);
            } else if (cmd.includes("trái")) {
                send('L');
                voiceTimeout = setTimeout(() => send('S'), 1000);
            } else if (cmd.includes("phải")) {
                send('R');
                voiceTimeout = setTimeout(() => send('S'), 1000);
            } else if (cmd.includes("dừng") || cmd.includes("lại")) {
                send('S');
            }
        }

        function toggleVoice() {
            if (!voiceActive) {
                recognition.start();
                voiceActive = true;
                document.getElementById('btn-voice').innerText = "ĐANG NGHE...";
                document.getElementById('btn-voice').classList.add('active');
            } else {
                stopVoice();
            }
        }

        function stopVoice() {
            recognition.stop();
            voiceActive = false;
            document.getElementById('btn-voice').innerText = "BẬT ĐIỀU KHIỂN GIỌNG NÓI";
            document.getElementById('btn-voice').classList.remove('active');
        }

        function send(dir) {
            if(autoActive && dir !== 'S') return;
            fetch(`${ESP32_IP}/move?dir=${dir}`).catch(() => {});
        }

        function toggleAuto() {
            autoActive = !autoActive;
            document.getElementById('mode-text').innerText = autoActive ? "TỰ ĐỘNG" : "THỦ CÔNG";
            fetch(`${ESP32_IP}/mode?auto=${autoActive ? 1 : 0}`);
        }

        setInterval(() => {
            fetch(`${ESP32_IP}/data`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('dist-val').innerText = data.dist;
                    document.getElementById('conn-status').innerText = "ĐÃ KẾT NỐI";
                    document.getElementById('conn-status').className = "val";
                })
                .catch(() => {
                    document.getElementById('conn-status').innerText = "MẤT KẾT NỐI";
                    document.getElementById('conn-status').className = "disconnected";
                });
        }, 500);

        document.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            const key = e.key.toLowerCase();
            if(key === 'w') send('F');
            else if(key === 's') send('B');
            else if(key === 'a') send('L');
            else if(key === 'd') send('R');
        });
        document.addEventListener('keyup', (e) => {
            if(['w','a','s','d'].includes(e.key.toLowerCase())) send('S');
        });
    </script>
</body>
</html>
