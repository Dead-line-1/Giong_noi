<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; }
        .header { background: #2c3e50; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .main-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        /* Video Area */
        .video-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .cam-box { border: 4px solid #34495e; border-radius: 10px; overflow: hidden; background: #000; width: 640px; height: 480px; position: relative; max-width: 100%; }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 14px; border-radius: 5px; z-index: 10; font-weight: bold;}

        /* Sidebar Controls */
        .sidebar { background: #2c3e50; padding: 20px; border-radius: 10px; min-width: 320px; }
        .status-box { text-align: left; font-size: 15px; background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #3498db; line-height: 1.6; }
        .val { color: #2ecc71; font-weight: bold; }
        .disconnected { color: #e74c3c; font-weight: bold; }
        .warning { color: #f39c12; font-weight: bold; }
        
        /* Buttons */
        .controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; justify-content: center; margin-bottom: 20px; }
        .btn { padding: 18px; font-size: 20px; cursor: pointer; background: #34495e; border: 1px solid #5d6d7e; color: white; border-radius: 12px; transition: 0.2s; }
        .btn:active { background: #2ecc71; transform: scale(0.9); }
        .btn-stop { background: #e74c3c; grid-column: 2; }

        /* Mode Buttons */
        .mode-btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px;}
        .btn-voice { background: #9b59b6; } 
        .btn-voice.active { background: #8e44ad; box-shadow: 0 0 15px #9b59b6; animation: pulse 1.5s infinite; }

        #voice-log { font-size: 13px; color: #f1c40f; margin-top: 10px; min-height: 20px; font-style: italic; }
        .keyboard-hint { font-size: 12px; margin-top: 15px; color: #bdc3c7; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h2>MÔ HÌNH ĐIỀU KHIỂN XE BẰNG GIỌNG NÓI</h2>
    </div>

    <div class="main-grid">
        <div class="video-wrapper">
            <div class="cam-box">
                <span class="label">🔴 LIVE CAMERA ESP32-CAM</span>
                <img id="video-stream" src="http://192.168.1.29:81/stream" crossorigin="anonymous" alt="Đang chờ kết nối Camera...">
            </div>
        </div>

        <div class="sidebar">
            <div class="status-box">
                Kết nối: <span id="conn-status" class="disconnected">Đang tìm ESP32...</span><br>
                Phát hiện vật cản: <span id="dist-val" class="val">0</span> cm <span id="warning-msg" class="warning"></span><br>
                Hướng di chuyển: <span id="stt-text" class="val">Dừng 🛑</span><br>
                Chế độ điều khiển: <span id="mode-text" class="val">THỦ CÔNG</span>
            </div>

            <div class="controls">
                <div></div><button class="btn" onmousedown="send('F')" onmouseup="send('S')" ontouchstart="send('F')" ontouchend="send('S')">▲</button><div></div>
                <button class="btn" onmousedown="send('L')" onmouseup="send('S')" ontouchstart="send('L')" ontouchend="send('S')">◀</button>
                <button class="btn btn-stop" onmousedown="send('S')" ontouchstart="send('S')">■</button>
                <button class="btn" onmousedown="send('R')" onmouseup="send('S')" ontouchstart="send('R')" ontouchend="send('S')">▶</button>
                <div></div><button class="btn" onmousedown="send('B')" onmouseup="send('S')" ontouchstart="send('B')" ontouchend="send('S')">▼</button><div></div>
            </div>

            <button id="btn-voice" class="mode-btn btn-voice" onclick="toggleVoice()">BẬT ĐIỀU KHIỂN GIỌNG NÓI</button>
            <div id="voice-log">Đang chờ lệnh giọng nói...</div>
            
            <div class="keyboard-hint">💡 Gợi ý: Có thể dùng phím W, A, S, D trên máy tính để lái</div>
        </div>
    </div>

    <script>
        const ESP32_IP = "http://192.168.1.16"; 
        
        let lastCmd = 'S';
        let currentDistance = 999; // Khởi tạo khoảng cách an toàn mặc định
        
        // Cấu hình thời gian cho giọng nói
        const TIME_SHORT_MOVE = 400; 
        const TIME_TURN_90 = 600;    
        let voiceTimeout1, voiceTimeout2; 

        // ==========================================
        // 1. HỆ THỐNG GỬI LỆNH & MAP HƯỚNG DI CHUYỂN
        // ==========================================
        function send(dir) {
            // Lọc lệnh: Nếu lệnh là tiến (F) nhưng khoảng cách <= 10cm thì chặn lại và ép về dừng (S)
            if (dir === 'F' && currentDistance <= 10) {
                dir = 'S';
                document.getElementById('warning-msg').innerText = "(Quá gần!)";
            }

            if (dir !== lastCmd) {
                // Hiển thị chữ tiếng Việt tương ứng
                let dirText = "Dừng 🛑";
                if(dir === 'F') dirText = "Tiến ⬆️";
                else if(dir === 'B') dirText = "Lùi ⬇️";
                else if(dir === 'L') dirText = "Trái ⬅️";
                else if(dir === 'R') dirText = "Phải ➡️";

                document.getElementById('stt-text').innerText = dirText;
                
                // Gửi lệnh tới ESP32
                fetch(`${ESP32_IP}/move?dir=${dir}`).catch(() => {});
                lastCmd = dir;
            }
        }

        // Lấy dữ liệu cảm biến liên tục
        setInterval(() => {
            fetch(`${ESP32_IP}/data`)
                .then(res => res.json())
                .then(data => {
                    // Cảm biến trả về mm, chia 10 để ra cm (làm tròn 1 chữ số thập phân)
                    let distCm = (data.dist / 10).toFixed(1);
                    currentDistance = parseFloat(distCm); // Cập nhật biến toàn cục

                    document.getElementById('dist-val').innerText = distCm;
                    document.getElementById('conn-status').innerText = "ĐÃ KẾT NỐI ESP32";
                    document.getElementById('conn-status').className = "val";

                    // Logic cảnh báo và tự động dừng khi gặp vật cản <= 10cm
                    if (currentDistance <= 10) {
                        document.getElementById('dist-val').className = "disconnected"; // Đổi màu đỏ
                        if (lastCmd === 'F') {
                            send('S'); // Tự động gửi lệnh dừng nếu đang đi tới
                            document.getElementById('warning-msg').innerText = "(Đã tự động dừng!)";
                        }
                    } else {
                        document.getElementById('dist-val').className = "val"; // Trả lại màu xanh
                        document.getElementById('warning-msg').innerText = "";
                    }
                })
                .catch(() => {
                    document.getElementById('conn-status').innerText = "MẤT KẾT NỐI ESP32";
                    document.getElementById('conn-status').className = "disconnected";
                });
        }, 500);

        // ==========================================
        // 2. ĐIỀU KHIỂN BẰNG BÀN PHÍM
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            const key = e.key.toLowerCase();
            if(key === 'w') send('F');
            else if(key === 's') send('B');
            else if(key === 'a') send('L');
            else if(key === 'd') send('R');
        });
        
        document.addEventListener('keyup', (e) => {
            if(['w','a','s','d'].includes(e.key.toLowerCase())) send('S');
        });

        // ==========================================
        // 3. ĐIỀU KHIỂN GIỌNG NÓI
        // ==========================================
        let recognition;
        let voiceActive = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'vi-VN'; 
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
                document.getElementById('voice-log').innerText = "🗣️ Bạn đã nói: " + result;
                handleVoiceCommand(result);
            };

            recognition.onerror = (e) => {
                console.error("Lỗi Voice:", e.error);
                stopVoice();
            };
        }

        function handleVoiceCommand(cmd) {
            clearTimeout(voiceTimeout1);
            clearTimeout(voiceTimeout2);

            // Xoay hướng rồi tiến
            if (cmd.includes("sang phải") || cmd.includes("tiến về bên phải") || cmd.includes("tiến bên phải")) {
                send('R'); 
                voiceTimeout1 = setTimeout(() => {
                    send('F'); 
                    voiceTimeout2 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
                }, TIME_TURN_90);
            } 
            else if (cmd.includes("sang trái") || cmd.includes("tiến về bên trái") || cmd.includes("tiến bên trái")) {
                send('L'); 
                voiceTimeout1 = setTimeout(() => {
                    send('F'); 
                    voiceTimeout2 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
                }, TIME_TURN_90);
            }
            // Xoay tại chỗ 
            else if (cmd.includes("xoay phải")) {
                send('R');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_TURN_90);
            } 
            else if (cmd.includes("xoay trái")) {
                send('L');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_TURN_90);
            }
            // Đi tới/lui
            else if (cmd.includes("tới") || cmd.includes("tiến") || cmd.includes("lên")) {
                send('F');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_SHORT_MOVE); 
            } 
            else if (cmd.includes("lùi") || cmd.includes("xuống")) {
                send('B');
                voiceTimeout1 = setTimeout(() => send('S'), TIME_SHORT_MOVE);
            } 
            // Dừng
            else if (cmd.includes("dừng") || cmd.includes("lại")) {
                send('S');
            }
        }

        function toggleVoice() {
            if (!recognition) return alert("Trình duyệt không hỗ trợ Web Speech API (Hãy dùng Chrome).");
            if (!voiceActive) {
                recognition.start();
                voiceActive = true;
                document.getElementById('btn-voice').innerText = "ĐANG NGHE... (BẤM ĐỂ TẮT)";
                document.getElementById('btn-voice').classList.add('active');
            } else {
                stopVoice();
            }
        }

        function stopVoice() {
            recognition.stop();
            voiceActive = false;
            document.getElementById('btn-voice').innerText = "BẬT ĐIỀU KHIỂN GIỌNG NÓI";
            document.getElementById('btn-voice').classList.remove('active');
            document.getElementById('voice-log').innerText = "Đã tắt giọng nói.";
            send('S');
        }
    </script>
</body>
</html>
